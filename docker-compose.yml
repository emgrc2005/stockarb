services:
  stat-arb:
    build:
      context: .
      dockerfile: Dockerfile
    image: stockarb:latest
    container_name: stockarb
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # SQLite DB persists across restarts/redeploys.
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3, os; sqlite3.connect(os.environ.get('DB_PATH', '/app/data/stat_arb.db')).execute('SELECT 1')"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
